<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1C1C1E">
<title>AI 가계부</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F2F2F7;--surface:#fff;--ink:#1C1C1E;--ink2:#3A3A3C;
  --muted:#8E8E93;--divider:#E5E5EA;--income:#30D158;--danger:#FF453A;
  --radius-lg:18px;--radius-md:14px;--radius-sm:10px;
  --tab-h:72px;--safe-bot:env(safe-area-inset-bottom,0px)
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
#root{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}

/* 스크롤 */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + var(--safe-bot) + 16px);scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}

/* 탭바 */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--tab-h) + var(--safe-bot));background:rgba(255,255,255,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--divider);display:flex;z-index:100;padding-bottom:var(--safe-bot)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;padding:8px 0 4px}
.tab-btn svg{width:24px;height:24px}
.tab-btn span{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.02em}
.tab-btn.active span{color:var(--ink)}
.tab-btn svg path,.tab-btn svg rect,.tab-btn svg circle{fill:var(--muted)}
.tab-btn.active svg path,.tab-btn.active svg rect,.tab-btn.active svg circle{fill:var(--ink)}

/* 헤더 */
.page-header{padding:56px 20px 12px;position:sticky;top:0;background:var(--bg);z-index:10}
.page-title{font-size:28px;font-weight:700;letter-spacing:-.5px}
.page-sub{font-size:14px;color:var(--muted);margin-top:2px}

/* 카드 */
.card{background:var(--surface);border-radius:var(--radius-md);margin:0 16px 12px}

/* 히어로 카드 */
.summary-hero{background:var(--ink);border-radius:var(--radius-lg);margin:8px 16px 12px;padding:22px 20px 18px;color:#fff}
.sh-label{font-size:12px;color:rgba(255,255,255,.45);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.sh-balance{font-size:36px;font-weight:700;letter-spacing:-1px}
.sh-balance .unit{font-size:18px;font-weight:500;margin-left:3px}
.sh-row{display:flex;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}
.sh-col{flex:1;padding:0 10px;border-right:1px solid rgba(255,255,255,.12)}
.sh-col:first-child{padding-left:0}
.sh-col:last-child{border-right:none}
.sh-col-label{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:3px}
.sh-col-val{font-size:17px;font-weight:700;color:#fff}
.sh-col-val.income{color:var(--income)}
.sh-col-val.expense{color:#FF6B6B}

/* 칩 */
.chips-row{display:flex;gap:8px;padding:0 16px;margin-bottom:12px}
.chip{flex:1;background:var(--surface);border-radius:var(--radius-sm);padding:11px 6px;text-align:center}
.chip-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.chip-value{font-size:14px;font-weight:700;color:var(--ink)}

/* 섹션 타이틀 */
.section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:0 20px;margin-bottom:6px}

/* 날짜 그룹 헤더 */
.date-group-hd{display:flex;justify-content:space-between;padding:10px 20px 4px;font-size:13px;font-weight:700;color:var(--muted)}

/* 거래 목록 */
.tx-list{margin:0 16px 8px;background:var(--surface);border-radius:var(--radius-md);overflow:hidden}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;border-top:1px solid var(--divider);cursor:pointer;transition:background .12s}
.tx-item:first-child{border-top:none}
.tx-item:active{background:var(--bg)}
.tx-left{display:flex;flex-direction:column;gap:2px}
.tx-name{font-size:15px;font-weight:600;color:var(--ink)}
.tx-meta{font-size:12px;color:var(--muted)}
.tx-right{text-align:right;flex-shrink:0;margin-left:12px}
.tx-amount{font-size:16px;font-weight:700}
.tx-amount.income{color:var(--income)}
.tx-amount.expense{color:var(--ink)}
.tx-method{font-size:11px;color:var(--muted);margin-top:1px}

/* FAB */
.fab{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bot) + 16px);right:calc(50% - 210px + 16px);width:54px;height:54px;background:var(--ink);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:300;box-shadow:0 4px 20px rgba(0,0,0,.28);cursor:pointer;border:none;z-index:90;transition:transform .15s;line-height:1}
.fab:active{transform:scale(.93)}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;padding-bottom:var(--safe-bot)}
.modal-sheet{width:100%;max-width:430px;margin:0 auto;background:var(--surface);border-radius:24px 24px 0 0;padding:0 20px 24px;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--divider);border-radius:2px;margin:12px auto 20px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}

/* 입력 */
.input-field{width:100%;background:var(--bg);border:none;outline:none;border-radius:var(--radius-sm);padding:13px 14px;font-size:15px;color:var(--ink);font-family:inherit;resize:none}
.input-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.input-hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6}
.select-field{width:100%;background:var(--bg);border:none;outline:none;border-radius:var(--radius-sm);padding:13px 14px;font-size:15px;color:var(--ink);font-family:inherit;-webkit-appearance:none}

/* 파싱 결과 카드 */
.parse-card{background:var(--bg);border-radius:var(--radius-sm);padding:4px 14px;margin:12px 0}
.parse-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--divider)}
.parse-row:last-child{border-bottom:none}
.parse-key{font-size:12px;color:var(--muted);flex-shrink:0;margin-right:12px}
.parse-edit-input{background:none;border:none;border-bottom:1.5px solid var(--divider);outline:none;font-size:13px;font-weight:600;color:var(--ink);font-family:inherit;text-align:right;width:180px;padding:2px 4px;transition:border-color .15s}
.parse-edit-input:focus{border-bottom-color:var(--ink)}
.parse-edit-input[type="number"]{-moz-appearance:textfield}
.parse-edit-input[type="number"]::-webkit-inner-spin-button,.parse-edit-input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none}
.parse-edit-select{background:none;border:none;border-bottom:1.5px solid var(--divider);outline:none;font-size:13px;font-weight:600;color:var(--ink);font-family:inherit;text-align:right;padding:2px 4px;cursor:pointer;-webkit-appearance:none;max-width:180px}
.parse-edit-select:focus{border-bottom-color:var(--ink)}
.parse-seg{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.parse-seg-btn{padding:3px 10px;border-radius:8px;border:1.5px solid var(--divider);background:none;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .12s}
.parse-seg-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}

/* 버튼 */
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:opacity .12s}
.btn:active{opacity:.75}
.btn-primary{background:var(--ink);color:#fff}
.btn-secondary{background:var(--bg);color:var(--ink)}
.btn-danger{background:#FF453A22;color:var(--danger)}

/* 세그먼트 컨트롤 */
.seg-ctrl{display:flex;gap:6px;background:var(--bg);border-radius:var(--radius-sm);padding:3px}
.seg-btn{flex:1;padding:8px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:var(--muted);transition:all .15s}
.seg-btn.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.form-group{margin-bottom:14px}

/* 통계 */
.stat-month-nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin-bottom:12px}
.mnav-btn{width:34px;height:34px;background:var(--surface);border-radius:50%;border:none;cursor:pointer;font-size:18px;color:var(--ink);display:flex;align-items:center;justify-content:center}
.month-label{font-size:18px;font-weight:700}
.bar-row2{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bar-cat2{width:50px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
.bar-track2{flex:1;height:10px;background:var(--bg);border-radius:5px;overflow:hidden}
.bar-fill2{height:100%;border-radius:5px;background:var(--ink);transition:width .4s ease}
.bar-val2{width:70px;font-size:11px;font-weight:700;color:var(--ink);text-align:right;flex-shrink:0}
.donut-row{display:flex;gap:10px;padding:0 16px;margin-bottom:12px}
.donut-card{flex:1;background:var(--surface);border-radius:var(--radius-md);padding:14px 12px}
.donut-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.legend-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-text{font-size:11px;color:var(--muted);flex:1}
.legend-pct{font-size:12px;font-weight:700;color:var(--ink)}
.top5-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-top:1px solid var(--divider)}
.top5-item:first-child{border-top:none}
.top5-rank{font-size:13px;font-weight:700;color:var(--muted);width:18px;text-align:center}
.top5-name{font-size:14px;font-weight:600;color:var(--ink);flex:1}
.top5-cnt{font-size:12px;color:var(--muted)}
.top5-amt{font-size:14px;font-weight:700;color:var(--ink)}

/* 월별 */
.monthly-stats{display:flex;gap:10px;padding:0 16px;margin-bottom:12px}
.monthly-stat-card{flex:1;background:var(--surface);border-radius:var(--radius-md);padding:14px 12px;text-align:center}
.mstat-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.mstat-val{font-size:14px;font-weight:700;color:var(--ink)}
.mstat-val.up{color:var(--danger)}
.mstat-val.down{color:var(--income)}
.chart-container{background:var(--surface);border-radius:var(--radius-md);margin:0 16px 12px;padding:16px 14px 10px}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:100px;border-bottom:1px solid var(--divider);padding-bottom:8px;margin-bottom:6px}
.chart-col2{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;height:100%;cursor:pointer}
.bar-pair2{display:flex;gap:2px;align-items:flex-end;justify-content:center}
.bar-in2{width:14px;border-radius:3px 3px 0 0;background:var(--income);opacity:.75}
.bar-ex2{width:14px;border-radius:3px 3px 0 0;background:var(--ink);opacity:.8}
.chart-mlabel{font-size:10px;color:var(--muted);font-weight:600}
.chart-legend-row{display:flex;gap:14px;justify-content:center;margin-top:6px}
.cl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:600}
.cl-dot2{width:8px;height:8px;border-radius:2px}
.month-list-card{background:var(--surface);border-radius:var(--radius-md);margin:0 16px 12px;overflow:hidden}
.month-list-item{display:flex;justify-content:space-between;align-items:center;padding:15px 16px;border-top:1px solid var(--divider);cursor:pointer;transition:background .12s}
.month-list-item:first-child{border-top:none}
.month-list-item:active{background:var(--bg)}
.ml-month{font-size:16px;font-weight:700;color:var(--ink)}
.ml-detail{font-size:12px;color:var(--muted);margin-top:2px}
.ml-right{text-align:right}
.ml-expense{font-size:16px;font-weight:700;color:var(--ink)}
.ml-diff{font-size:12px;margin-top:2px}
.ml-diff.up{color:var(--danger)}
.ml-diff.down{color:var(--income)}

/* 월별 상세 뷰 탭 */
.detail-view-tabs{display:flex;gap:8px;padding:0 16px;margin-bottom:12px}
.dvt-btn{flex:1;padding:9px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--surface);color:var(--muted);transition:all .15s}
.dvt-btn.active{background:var(--ink);color:#fff}

/* 카드사별 합계 */
.card-summary-item{display:flex;justify-content:space-between;align-items:flex-start;padding:13px 16px;border-top:1px solid var(--divider)}
.card-summary-item:first-child{border-top:none}
.cs-name{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
.cs-sub{font-size:12px;color:var(--muted)}
.cs-amt{font-size:16px;font-weight:700;color:var(--ink)}

/* 뒤로가기 */
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:16px;font-weight:600;color:var(--ink);cursor:pointer;padding:0}

/* 설정 */
.settings-group{margin:0 16px 16px}
.settings-group-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:0 4px;margin-bottom:6px}
.settings-list{background:var(--surface);border-radius:var(--radius-md);overflow:hidden}
.settings-item{display:flex;justify-content:space-between;align-items:center;padding:15px 16px;border-top:1px solid var(--divider);cursor:pointer}
.settings-item:first-child{border-top:none}
.settings-item:active{background:var(--bg)}
.settings-label{font-size:15px;color:var(--ink);font-weight:500}
.settings-value{font-size:14px;color:var(--muted);display:flex;align-items:center;gap:4px}
.toggle-sw{width:48px;height:28px;border-radius:14px;background:var(--divider);position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle-sw.on{background:#34C759}
.toggle-sw::after{content:'';width:24px;height:24px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:left .2s}
.toggle-sw.on::after{left:22px}
.budget-item{padding:12px 16px;border-top:1px solid var(--divider)}
.budget-item:first-child{border-top:none}
.budget-top{display:flex;justify-content:space-between;margin-bottom:6px}
.budget-name{font-size:14px;font-weight:600;color:var(--ink)}
.budget-nums{font-size:12px;color:var(--muted)}
.budget-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.budget-fill{height:100%;border-radius:3px;background:var(--ink);transition:width .4s}
.budget-fill.over{background:var(--danger)}

/* 내역탭 필터 */
.filter-panel{background:var(--surface);border-radius:var(--radius-md);margin:0 16px 12px;overflow:hidden}
.filter-toggle{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer;border:none;background:none;width:100%;font-family:inherit}
.filter-toggle-label{font-size:14px;font-weight:700;color:var(--ink)}
.filter-toggle-meta{font-size:12px;color:var(--muted)}
.filter-body{padding:0 16px 16px;border-top:1px solid var(--divider)}
.filter-section{margin-top:14px}
.filter-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.filter-chips{display:flex;flex-wrap:wrap;gap:6px}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;background:var(--bg);color:var(--muted);border:none;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.filter-chip.active{background:var(--ink);color:#fff}
.date-range-row{display:flex;align-items:center;gap:8px}
.date-range-input{flex:1;background:var(--bg);border:none;outline:none;border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;color:var(--ink);font-family:inherit}
.date-range-sep{font-size:13px;color:var(--muted);flex-shrink:0}
.quick-dates{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.quick-date-btn{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;background:var(--bg);color:var(--muted);border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.quick-date-btn:active{background:var(--ink);color:#fff}

/* 내역 뷰 전환 */
.list-view-tabs{display:flex;gap:8px;margin:0 16px 12px}
.lvt-btn{flex:1;padding:9px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--surface);color:var(--muted);transition:all .15s}
.lvt-btn.active{background:var(--ink);color:#fff}

/* 카드사별 보기 */
.card-group{background:var(--surface);border-radius:var(--radius-md);margin:0 16px 12px;overflow:hidden}
.card-group-header{padding:13px 16px 10px;border-bottom:1px solid var(--divider)}
.cg-name{font-size:16px;font-weight:700;color:var(--ink)}
.cg-total{font-size:13px;color:var(--muted);margin-top:2px}
.cg-item{display:flex;justify-content:flex-start;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid var(--divider);cursor:pointer;transition:background .12s}
.cg-item:active{background:var(--bg)}
.cg-item-left{display:flex;flex-direction:column;gap:2px}
.cg-item-name{font-size:14px;font-weight:600;color:var(--ink)}
.cg-item-meta{font-size:12px;color:var(--muted)}
.cg-item-right{text-align:right;flex-shrink:0;margin-left:12px}
.cg-item-amt{font-size:15px;font-weight:700;color:var(--ink)}
.cg-item-date{font-size:11px;color:var(--muted);margin-top:1px}

/* 요약 카드 */
.result-summary{background:var(--surface);border-radius:var(--radius-md);margin:0 16px 12px;padding:16px}
.rs-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--divider)}
.rs-count{font-size:15px;font-weight:700;color:var(--ink)}
.rs-total{font-size:15px;font-weight:700;color:var(--ink)}
.rs-section{margin-top:10px}
.rs-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.rs-row{display:flex;justify-content:space-between;padding:4px 0}
.rs-label{font-size:13px;color:var(--muted)}
.rs-val{font-size:13px;font-weight:700;color:var(--ink)}

/* 검색창 */
.search-bar{margin:0 16px 12px;background:var(--surface);border-radius:var(--radius-sm);display:flex;align-items:center;padding:10px 14px;gap:8px}
.search-bar input{flex:1;border:none;outline:none;font-size:15px;color:var(--ink);background:transparent;font-family:inherit}
.search-bar input::placeholder{color:var(--muted)}

/* 스피너 */
.spinner{width:20px;height:20px;border:2px solid var(--divider);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* 토스트 */
.toast{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bot) + 80px);left:50%;transform:translateX(-50%);background:var(--ink2);color:#fff;padding:12px 20px;border-radius:24px;font-size:14px;font-weight:600;z-index:300;animation:fadeUp .25s ease;white-space:nowrap}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

const { useState, useEffect, useMemo, useRef } = React;

/* ══ 상수 ══ */

// 결제수단: 대분류 → 상세수단
const METHOD_GROUPS = {
  '현금': ['현금', '계좌이체'],
  '카드': ['삼성카드','신한카드','현대카드','KB카드','롯데카드','하나카드','우리카드','기타카드']

const ALL_METHODS = Object.values(METHOD_GROUPS).flat();
const CATEGORIES_EXPENSE = ['식비','카페','교통','생활','쇼핑','의료','교육','주거','여가','골프','업무비','기타'];

// 대분류 판별
function methodGroup(method) {

/* ══ 유틸 ══ */
function fmt(n) {
  if (!n && n !== 0) return '0';
  return Math.abs(Math.round(n)).toLocaleString('ko-KR');
}
function today() { return new Date().toISOString().slice(0,10); }
function thisMonth() { return today().slice(0,7); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function fmtDateFull(s) {
  const d = new Date(s+'T00:00:00');
  return `${d.getMonth()+1}월 ${d.getDate()}일 ${'일월화수목금토'[d.getDay()]}요일`;
}
function fmtDateShort(s) {
  const d = new Date(s+'T00:00:00');
  return `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}.`;
}
function fmtYM(ym) {
  const [y,m] = ym.split('-');
  return `${y}년 ${parseInt(m)}월`;
}
function addDays(dateStr, n) {
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function monthStart(ym) { return ym+'-01'; }
function monthEnd(ym) {
  const [y,m] = ym.split('-').map(Number);
  return new Date(y, m, 0).toISOString().slice(0,10);
}

  '교육':  ['학원','과외','교육','수업','강의','책','교재','문제집','인강','독서','도서','등록금','수강'],
  '주거':  ['월세','전세','관리비','전기','가스','수도','인터넷','통신','핸드폰','휴대폰','kt','sk통신','lg유플러스','인테리어','가구','가전'],
  '여가':  ['영화','cgv','롯데시네마','메가박스','공연','연극','뮤지컬','콘서트','노래방','pc방','여행','숙박','호텔','펜션','레저','스포츠','헬스','요가','골프','등산','낚시','캠핑'],

const INCOME_KEYWORDS = ['급여','월급','보너스','상여','용돈','송금','환급','환불','수당','알바','부수입','이자','배당','임대','연금'];
const METHOD_KW = {
  '삼성카드':['삼성카드','samsung'],
  '신한카드':['신한카드','신한'],
  '현대카드':['현대카드','현대'],

  '현금':['현금'],
};

function parseKoreanAmount(text) {
  let m = text.match(/(\d[\d,]*)\s*원/);
  if (m) return parseInt(m[1].replace(/,/g,''));
  m = text.match(/(\d+)\s*만\s*(\d+)?\s*천?/);
  if (m) return parseInt(m[1])*10000 + (m[2]?parseInt(m[2])*1000:0);
  m = text.match(/(\d+)\s*만/);
  if (m) return parseInt(m[1])*10000;
  m = text.match(/(\d+)\s*천/);
  if (m) return parseInt(m[1])*1000;
  m = text.match(/\b(\d{3,})\b/);
  if (m) return parseInt(m[1]);
  return null;
}
function parseDate(text) {
  const now = new Date();
  const yyyy = now.getFullYear();
  const pad = n => String(n).padStart(2,'0');
  const toStr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  if (/오늘/.test(text)) return today();
  if (/어제/.test(text)) return toStr(new Date(now-86400000));
  if (/그제|그저께/.test(text)) return toStr(new Date(now-172800000));
  let m = text.match(/(\d{1,2})[\/\.](\d{1,2})/);
  if (!m) m = text.match(/(\d{1,2})월\s*(\d{1,2})일?/);
  if (m) return `${yyyy}-${pad(parseInt(m[1]))}-${pad(parseInt(m[2]))}`;
  m = text.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m) return m[0];
  return today();
}
function guessMethod(text) {
  const t = text.toLowerCase();
  for (const [method, kws] of Object.entries(METHOD_KW)) {
    for (const kw of kws) if (t.includes(kw)) return method;
  }
  // 카드 키워드만 있는 경우
  if (/카드/.test(t)) return '기타카드';
  return '현금';
}
function guessCategory(text, isIncome) {
  const t = text.toLowerCase();
  if (isIncome) {
    if (/급여|월급|보너스|상여/.test(t)) return '급여';
    if (/용돈|송금/.test(t)) return '용돈/송금';
    if (/알바|부수입/.test(t)) return '부수입';
    return '기타수입';
  }
  for (const [cat, kws] of Object.entries(CAT_KEYWORDS)) {
    for (const kw of kws) if (t.includes(kw)) return cat;
  }
  return '기타';
}
function guessSubject(text) {
  if (/생활비|생활/.test(text)) return '생활비';
  if (/업무|회사|법인|출장|접대/.test(text)) return '업무';
  return '개인';
}
function isIncomeText(text) {
  return INCOME_KEYWORDS.some(kw => text.toLowerCase().includes(kw));
}
function guessPlace(text) {
  let t = text;
  t = t.replace(/\d{1,2}[\/\.]\d{1,2}/, '');
  t = t.replace(/\d{1,2}월\s*\d{1,2}일?/, '');
  t = t.replace(/오늘|어제|그제|그저께/, '');
  t = t.replace(/\d[\d,]*\s*원/, '');
  t = t.replace(/\d+\s*만\s*\d*\s*천?/, '');
  t = t.replace(/\d+\s*만/, '');
  t = t.replace(/\d+\s*천/, '');
  t = t.replace(/\b\d{3,}\b/, '');
  for (const kws of Object.values(METHOD_KW)) for (const kw of kws) t = t.replace(new RegExp(kw,'gi'),' ');
  t = t.replace(/개인|생활비|생활|업무/, '');
  t = t.replace(/[,·\-\/\.]/g,' ').replace(/\s+/g,' ').trim();
  const tokens = t.split(' ').filter(w=>w.length>=1);
  return tokens.join(' ');
}
function parseWithAI(text) {
  return new Promise((resolve, reject) => {
    try {
      const isIncome = isIncomeText(text);
      const amount   = parseKoreanAmount(text);
      if (!amount || amount <= 0) { reject(new Error('금액 없음')); return; }
      resolve({
        date:     parseDate(text),
        type:     isIncome ? 'income' : 'expense',
        amount,
        method:   guessMethod(text),
        category: guessCategory(text, isIncome),
        place:    guessPlace(text) || guessCategory(text, isIncome),
        subject:  guessSubject(text),
        memo:     ''
      });
    } catch(e) { reject(e); }
  });
}

/* ══ TxItem ══ */
function TxItem({ tx, onClick }) {
  const isIncome = tx.type === 'income';
  return (
    <div className="tx-item" onClick={() => onClick && onClick(tx)}>
      <div className="tx-left">
        <div className="tx-name">{tx.place || tx.category}</div>
        <div className="tx-meta">{tx.category} · {tx.subject}</div>
      </div>
      <div className="tx-right">
        <div className={`tx-amount ${isIncome?'income':'expense'}`}>
          {isIncome?'+':'−'}{fmt(tx.amount)}원
        </div>
        <div className="tx-method">{tx.method}</div>
      </div>
    </div>
  );
}

/* ══ TxGrouped ══ */
function TxGrouped({ txList, onTxClick }) {
  const grouped = useMemo(() => {
    const map = {};
    txList.forEach(tx => { if (!map[tx.date]) map[tx.date]=[]; map[tx.date].push(tx); });
    return Object.entries(map)
      .sort(([a],[b]) => b.localeCompare(a))
      .map(([date, items]) => ({
        date,
        items: [...items].sort((a,b) => b.id.localeCompare(a.id)),
        total: items.reduce((s,t) => t.type==='expense'?s-t.amount:s+t.amount, 0)
      }));
  }, [txList]);

  if (!txList.length) return <div className="empty-state"><p>내역이 없습니다.<br/>+ 버튼으로 입력해보세요.</p></div>;
  return (
    <>
      {grouped.map(g => (
        <div key={g.date}>
          <div className="date-group-hd">
            <span>{fmtDateFull(g.date)}</span>
            <span style={{color:g.total>=0?'var(--income)':'inherit'}}>
              {g.total>=0?'+':'−'}{fmt(Math.abs(g.total))}원
            </span>
          </div>
          <div className="tx-list">
            {g.items.map(tx => <TxItem key={tx.id} tx={tx} onClick={onTxClick}/>)}
          </div>
        </div>
      ))}
    </>
  );
}

/* ══ 입력 모달 ══ */
function InputModal({ onClose, onSave, editTx }) {
  const [mode, setMode] = useState(editTx ? 'form' : 'text');
  const [inputText, setInputText] = useState('');
  const [parsing, setParsing] = useState(false);
  const [parsed, setParsed] = useState(null);
  const [parseError, setParseError] = useState('');
  const [form, setForm] = useState(editTx || {
    type:'expense', date:today(), amount:'', method:'현금',
    category:'식비', place:'', subject:'개인', memo:''
  });

  async function handleParse() {
    if (!inputText.trim()) return;
    setParsing(true); setParseError('');
    try { setParsed(await parseWithAI(inputText.trim())); }
    catch { setParseError('금액을 찾지 못했습니다. 금액(예: 12000원)을 포함해 다시 입력해 주세요.'); }
    finally { setParsing(false); }
  }
  function handleSaveParsed() {
    if (!parsed) return;
    onSave({...parsed, id: editTx?.id || genId()});
  }
  function handleSaveForm() {
    if (!form.amount || !form.date) return;
    onSave({...form, amount:Number(String(form.amount).replace(/,/g,'')), id:editTx?.id||genId()});
  }

  // 결제수단 그룹 UI용
  const [methodGroup2, setMethodGroup2] = useState(() => {
    if (editTx) return methodGroup(editTx.method) === '카드' ? '카드' : '현금';
    return '현금';
  });

  const curCats = form.type==='expense' ? CATEGORIES_EXPENSE : CATEGORIES_INCOME;

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-sheet">
        <div className="modal-handle"/>
        <div className="modal-title">{editTx?'내역 수정':'내역 입력'}</div>

        {!editTx && (
          <div className="form-group">
            <div className="seg-ctrl">
              <button className={`seg-btn ${mode==='text'?'active':''}`} onClick={()=>{setMode('text');setParsed(null);}}>자동 인식</button>
              <button className={`seg-btn ${mode==='form'?'active':''}`} onClick={()=>setMode('form')}>직접 입력</button>
            </div>
          </div>
        )}

        {/* 자동 인식 */}
        {mode==='text' && (
          <>
            <div className="form-group">
              <div className="input-label">자유롭게 입력</div>
              <textarea className="input-field" rows={3}
                placeholder="예) 6/13 삼성카드 12000원 다이소 개인"
                value={inputText}
                onChange={e=>{setInputText(e.target.value);setParsed(null);}}/>
              <div className="input-hint">
                날짜 · 결제수단 · 금액 · 비용처 · 주체를 자유로운 순서로 입력하세요.<br/>
                예) 6/13 삼성카드 12000원 다이소 개인<br/>
                예) 어제 현금 5천 편의점 생활비<br/>
                ※ 금액은 반드시 포함해야 합니다.
              </div>
            </div>
            {parseError && <div style={{color:'var(--danger)',fontSize:13,marginBottom:8}}>{parseError}</div>}
            {parsing && <div style={{padding:'16px 0'}}><div className="spinner"/></div>}

            {parsed && !parsing && (
              <>
                <div className="parse-card">
                  <div className="parse-row">
                    <span className="parse-key">날짜</span>
                    <input type="date" className="parse-edit-input" value={parsed.date}
                      onChange={e=>setParsed(p=>({...p,date:e.target.value}))}/>
                  </div>
                  <div className="parse-row">
                    <span className="parse-key">구분</span>
                    <div className="parse-seg">
                      <button className={`parse-seg-btn ${parsed.type==='expense'?'active':''}`}
                        onClick={()=>setParsed(p=>({...p,type:'expense',category:CATEGORIES_EXPENSE.includes(p.category)?p.category:'식비'}))}>지출</button>
                      <button className={`parse-seg-btn ${parsed.type==='income'?'active':''}`}
                        onClick={()=>setParsed(p=>({...p,type:'income',category:CATEGORIES_INCOME.includes(p.category)?p.category:'급여'}))}>수입</button>
                    </div>
                  </div>
                  <div className="parse-row">
                    <span className="parse-key">금액</span>
                    <input type="number" className="parse-edit-input" inputMode="numeric" value={parsed.amount}
                      onChange={e=>setParsed(p=>({...p,amount:Number(e.target.value)}))}/>
                  </div>
                  <div className="parse-row">
                    <span className="parse-key">결제수단</span>
                    <select className="parse-edit-select" value={parsed.method}
                      onChange={e=>setParsed(p=>({...p,method:e.target.value}))}>
                      {ALL_METHODS.map(m=><option key={m}>{m}</option>)}
                    </select>
                  </div>
                  <div className="parse-row">
                    <span className="parse-key">카테고리</span>
                    <select className="parse-edit-select" value={parsed.category}
                      onChange={e=>setParsed(p=>({...p,category:e.target.value}))}>
                      {(parsed.type==='expense'?CATEGORIES_EXPENSE:CATEGORIES_INCOME).map(c=><option key={c}>{c}</option>)}
                    </select>
                  </div>
                  <div className="parse-row">
                    <span className="parse-key">비용처</span>
                    <input type="text" className="parse-edit-input" value={parsed.place}
                      onChange={e=>setParsed(p=>({...p,place:e.target.value}))}/>
                  </div>
                  <div className="parse-row">
                    <span className="parse-key">주체</span>
                    <div className="parse-seg">
                      {SUBJECTS.map(s=>(
                        <button key={s} className={`parse-seg-btn ${parsed.subject===s?'active':''}`}
                          onClick={()=>setParsed(p=>({...p,subject:s}))}>{s}</button>
                      ))}
                    </div>
                  </div>
                  <div className="parse-row">
                    <span className="parse-key">메모</span>
                    <input type="text" className="parse-edit-input" placeholder="선택" value={parsed.memo||''}
                      onChange={e=>setParsed(p=>({...p,memo:e.target.value}))}/>
                  </div>
                </div>
                <div className="btn-row">
                  <button className="btn btn-secondary" onClick={()=>setParsed(null)}>다시 입력</button>
                  <button className="btn btn-primary" onClick={handleSaveParsed}>저장</button>
                </div>
              </>
            )}
            {!parsed && !parsing && (
              <div className="btn-row">
                <button className="btn btn-secondary" onClick={onClose}>취소</button>
                <button className="btn btn-primary" onClick={handleParse} disabled={!inputText.trim()}>분석</button>
              </div>
            )}
          </>
        )}

        {/* 직접 입력 */}
        {mode==='form' && (
          <>
            <div className="form-group">
              <div className="seg-ctrl">
                <button className={`seg-btn ${form.type==='expense'?'active':''}`} onClick={()=>setForm(f=>({...f,type:'expense',category:'식비'}))}>지출</button>
                <button className={`seg-btn ${form.type==='income'?'active':''}`} onClick={()=>setForm(f=>({...f,type:'income',category:'급여'}))}>수입</button>
              </div>
            </div>
            <div className="form-group">
              <div className="input-label">날짜</div>
              <input type="date" className="input-field" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
            </div>
            <div className="form-group">
              <div className="input-label">금액 (원)</div>
              <input type="number" className="input-field" placeholder="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} inputMode="numeric"/>
            </div>
            {/* 결제수단: 대분류 → 상세 */}
            <div className="form-group">
              <div className="input-label">결제수단</div>
              <div className="seg-ctrl" style={{marginBottom:8}}>
                {Object.keys(METHOD_GROUPS).map(g=>(
                  <button key={g} className={`seg-btn ${methodGroup2===g?'active':''}`}
                    onClick={()=>{setMethodGroup2(g);setForm(f=>({...f,method:METHOD_GROUPS[g][0]}));}}>
                    {g}
                  </button>
                ))}
              </div>
              <select className="select-field" value={form.method} onChange={e=>setForm(f=>({...f,method:e.target.value}))}>
                {(METHOD_GROUPS[methodGroup2]||[]).map(m=><option key={m}>{m}</option>)}
              </select>
            </div>
            <div className="form-group">
              <div className="input-label">카테고리</div>
              <select className="select-field" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
                {(form.type==='expense'?CATEGORIES_EXPENSE:CATEGORIES_INCOME).map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group">
              <div className="input-label">비용처 / 내용</div>
              <input type="text" className="input-field" placeholder="예) 가온식당, 이마트, 급여" value={form.place} onChange={e=>setForm(f=>({...f,place:e.target.value}))}/>
            </div>
            <div className="form-group">
              <div className="input-label">주체</div>
              <div className="seg-ctrl">
                {SUBJECTS.map(s=>(
                  <button key={s} className={`seg-btn ${form.subject===s?'active':''}`} onClick={()=>setForm(f=>({...f,subject:s}))}>{s}</button>
                ))}
              </div>
            </div>
            <div className="form-group">
              <div className="input-label">메모 (선택)</div>
              <input type="text" className="input-field" placeholder="추가 메모" value={form.memo||''} onChange={e=>setForm(f=>({...f,memo:e.target.value}))}/>
            </div>
            <div className="btn-row">
              <button className="btn btn-secondary" onClick={onClose}>취소</button>
              <button className="btn btn-primary" onClick={handleSaveForm} disabled={!form.amount||!form.date}>저장</button>
            </div>
          </>
        )}
        <div style={{height:8}}/>
      </div>
    </div>
  );
}

/* ══ TAB 1: 홈 ══ */
function TabHome({ txList, onTxClick }) {
  const ym = thisMonth();
  const mTxs = useMemo(()=>txList.filter(t=>t.date.startsWith(ym)),[txList,ym]);
  const income  = useMemo(()=>mTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),[mTxs]);
  const expense = useMemo(()=>mTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0),[mTxs]);
  const balance = income - expense;

  // 대분류별 (현금 vs 카드)
  const cashExp = useMemo(()=>mTxs.filter(t=>t.type==='expense'&&methodGroup(t.method)==='현금').reduce((s,t)=>s+t.amount,0),[mTxs]);
  const cardExp = useMemo(()=>mTxs.filter(t=>t.type==='expense'&&methodGroup(t.method)==='카드').reduce((s,t)=>s+t.amount,0),[mTxs]);

  // 주체별
  const bySubject = useMemo(()=>{
    const r={};SUBJECTS.forEach(s=>r[s]=mTxs.filter(t=>t.type==='expense'&&t.subject===s).reduce((a,t)=>a+t.amount,0));return r;
  },[mTxs]);

  return (
    <div className="screen">
      <div className="page-header">
        <div className="page-title">가계부</div>
        <div className="page-sub">{fmtYM(ym)}</div>
      </div>

      <div className="summary-hero">
        <div className="sh-label">이번 달 잔액</div>
        <div className="sh-balance">{balance>=0?'+':'−'}{fmt(Math.abs(balance))}<span className="unit">원</span></div>
        <div className="sh-row">
          <div className="sh-col"><div className="sh-col-label">수입</div><div className="sh-col-val income">{fmt(income)}</div></div>
          <div className="sh-col"><div className="sh-col-label">지출</div><div className="sh-col-val expense">{fmt(expense)}</div></div>
        </div>
      </div>

      {/* 결제수단 대분류 */}
      <div className="chips-row">
        <div className="chip"><div className="chip-label">현금</div><div className="chip-value">{fmt(cashExp)}</div></div>
        <div className="chip"><div className="chip-label">카드</div><div className="chip-value">{fmt(cardExp)}</div></div>
      </div>

      {/* 주체별 */}
      <div className="chips-row">
        {SUBJECTS.map(s=>(
          <div key={s} className="chip"><div className="chip-label">{s}</div><div className="chip-value">{fmt(bySubject[s])}</div></div>
        ))}
      </div>

      <div className="section-title" style={{marginTop:4}}>이번 달 내역</div>
      <TxGrouped txList={mTxs} onTxClick={onTxClick}/>
    </div>
  );
}

/* ══ TAB 2: 내역 ══ */
function TabList({ txList, onTxClick }) {
  const [search, setSearch] = useState('');
  const [filterOpen, setFilterOpen] = useState(false);
  const [listView, setListView] = useState('date'); // 'date' | 'card'

  const ym = thisMonth();
  const [dateFrom, setDateFrom] = useState(monthStart(ym));
  const [dateTo,   setDateTo]   = useState(monthEnd(ym));
  const [selType,    setSelType]    = useState('전체');
  const [selMethod,  setSelMethod]  = useState('전체');
  const [selCat,     setSelCat]     = useState('전체');
  const [selSubject, setSelSubject] = useState('전체');

  function setQuickDate(key) {
    const t = today(); const ym2 = t.slice(0,7);
    if (key==='이번달')  { setDateFrom(monthStart(ym2)); setDateTo(monthEnd(ym2)); }
    if (key==='지난달')  {
      const [y,m] = ym2.split('-').map(Number);
      const pm = m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,'0')}`;
      setDateFrom(monthStart(pm)); setDateTo(monthEnd(pm));
    }
    if (key==='3개월') { setDateFrom(addDays(t,-90)); setDateTo(t); }
    if (key==='전체')  { setDateFrom('2020-01-01'); setDateTo('2099-12-31'); }
  }

  const filtered = useMemo(()=>{
    return txList.filter(t=>{
      if (t.date < dateFrom || t.date > dateTo) return false;
      if (selType==='지출'&&t.type!=='expense') return false;
      if (selType==='수입'&&t.type!=='income')  return false;
      if (selMethod!=='전체'&&methodGroup(t.method)!==selMethod) return false;
      if (selCat!=='전체'&&t.category!==selCat) return false;
      if (selSubject!=='전체'&&t.subject!==selSubject) return false;
      if (search.trim()) {
        const q=search.trim().toLowerCase();
        if (!(t.place||'').toLowerCase().includes(q)&&!(t.category||'').toLowerCase().includes(q)&&!(t.memo||'').toLowerCase().includes(q)) return false;
      }
      return true;
    });
  },[txList,dateFrom,dateTo,selType,selMethod,selCat,selSubject,search]);

  // 요약 계산
  const summary = useMemo(()=>{
    const expList = filtered.filter(t=>t.type==='expense');
    const totalExp = expList.reduce((s,t)=>s+t.amount,0);
    const totalInc = filtered.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const byMethod={}, byCat={}, bySubj={};
    expList.forEach(t=>{
      const mg=methodGroup(t.method);
      byMethod[mg]=(byMethod[mg]||0)+t.amount;
      byCat[t.category]=(byCat[t.category]||0)+t.amount;
      bySubj[t.subject]=(bySubj[t.subject]||0)+t.amount;
    });
    return {totalExp,totalInc,byMethod,byCat,bySubj,count:filtered.length};
  },[filtered]);

  // 카드사별 그룹 계산
  const byCardGroup = useMemo(()=>{
    const expList = filtered.filter(t=>t.type==='expense');
    const r={};
    expList.forEach(t=>{
      // 카드는 카드사명, 현금계열은 상세수단명으로 그룹
      const key = t.method;
      if(!r[key]) r[key]={name:key, group:methodGroup(t.method), total:0, items:[]};
      r[key].total += t.amount;
      r[key].items.push(t);
    });
    // 카드 그룹 먼저, 그 다음 현금 그룹, 각 내부는 합계 내림차순
    const sorted = Object.values(r).sort((a,b)=>{
      if(a.group!==b.group) return a.group==='카드'?-1:1;
      return b.total - a.total;
    });
    // 각 그룹 내 항목은 날짜 내림차순
    sorted.forEach(g=>{ g.items.sort((a,b)=>b.date.localeCompare(a.date)); });
    return sorted;
  },[filtered]);

  const activeFilters = [
    selType!=='전체',selMethod!=='전체',selCat!=='전체',selSubject!=='전체',
    dateFrom!==monthStart(ym)||dateTo!==monthEnd(ym)
  ].filter(Boolean).length;

  const catOptions = ['전체',...CATEGORIES_EXPENSE,...CATEGORIES_INCOME];

  return (
    <div className="screen">
      <div className="page-header"><div className="page-title">내역</div></div>

      {/* 검색 */}
      <div className="search-bar">
        <Icons.Search/>
        <input placeholder="비용처, 카테고리 검색" value={search} onChange={e=>setSearch(e.target.value)}/>
        {search && <span style={{color:'var(--muted)',cursor:'pointer',fontSize:16}} onClick={()=>setSearch('')}>✕</span>}
      </div>

      {/* 필터 패널 */}
      <div className="filter-panel">
        <button className="filter-toggle" onClick={()=>setFilterOpen(o=>!o)}>
          <span className="filter-toggle-label">필터 {activeFilters>0?`(${activeFilters}개 적용)`:''}</span>
          <span className="filter-toggle-meta">{filterOpen?'▲':'▼'}</span>
        </button>
        {filterOpen && (
          <div className="filter-body">
            <div className="filter-section">
              <div className="filter-section-title">기간</div>
              <div className="date-range-row">
                <input type="date" className="date-range-input" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
                <span className="date-range-sep">~</span>
                <input type="date" className="date-range-input" value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
              </div>
              <div className="quick-dates">
                {['이번달','지난달','3개월','전체'].map(k=>(
                  <button key={k} className="quick-date-btn" onClick={()=>setQuickDate(k)}>{k}</button>
                ))}
              </div>
            </div>
            <div className="filter-section">
              <div className="filter-section-title">구분</div>
              <div className="filter-chips">
                {['전체','지출','수입'].map(v=>(
                  <button key={v} className={`filter-chip ${selType===v?'active':''}`} onClick={()=>setSelType(v)}>{v}</button>
                ))}
              </div>
            </div>
            <div className="filter-section">
              <div className="filter-section-title">결제수단</div>
              <div className="filter-chips">
                {['전체','현금','카드'].map(v=>(
                  <button key={v} className={`filter-chip ${selMethod===v?'active':''}`} onClick={()=>setSelMethod(v)}>{v}</button>
                ))}
              </div>
            </div>
            <div className="filter-section">
              <div className="filter-section-title">카테고리</div>
              <div className="filter-chips">
                {catOptions.map(v=>(
                  <button key={v} className={`filter-chip ${selCat===v?'active':''}`} onClick={()=>setSelCat(v)}>{v}</button>
                ))}
              </div>
            </div>
            <div className="filter-section">
              <div className="filter-section-title">주체</div>
              <div className="filter-chips">
                {['전체',...SUBJECTS].map(v=>(
                  <button key={v} className={`filter-chip ${selSubject===v?'active':''}`} onClick={()=>setSelSubject(v)}>{v}</button>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* 결과 요약 */}
      <div className="result-summary">
        <div className="rs-header">
          <span className="rs-count">{summary.count}건</span>
          <span className="rs-total">지출 {fmt(summary.totalExp)}원 / 수입 {fmt(summary.totalInc)}원</span>
        </div>
        {summary.totalExp > 0 && (
          <>
            <div className="rs-section">
              <div className="rs-section-title">결제수단별</div>
              {Object.entries(summary.byMethod).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
                <div key={k} className="rs-row"><span className="rs-label">{k}</span><span className="rs-val">{fmt(v)}원</span></div>
              ))}
            </div>
            <div className="rs-section">
              <div className="rs-section-title">카테고리별</div>
              {Object.entries(summary.byCat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
                <div key={k} className="rs-row"><span className="rs-label">{k}</span><span className="rs-val">{fmt(v)}원</span></div>
              ))}
            </div>
            <div className="rs-section">
              <div className="rs-section-title">주체별</div>
              {Object.entries(summary.bySubj).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
                <div key={k} className="rs-row"><span className="rs-label">{k}</span><span className="rs-val">{fmt(v)}원</span></div>
              ))}
            </div>
          </>
        )}
      </div>

      {/* 뷰 전환 버튼 */}
      <div className="list-view-tabs">
        <button className={`lvt-btn ${listView==='date'?'active':''}`} onClick={()=>setListView('date')}>날짜순</button>

                    <div style={{width:90,fontSize:11,fontWeight:700,color:'var(--muted)',textAlign:'right'}}>금액</div>

                        {(()=>{const d=new Date(t.date+'T00:00:00');return `${d.getMonth()+1}/${d.getDate()}`;})()}
                      </div>
                      <div style={{width:52,fontSize:12,color:'var(--muted)',flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.subject||'-'}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div className="cg-item-name" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.category}</div>
                        <div className="cg-item-meta" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.place||''}</div>
                      </div>
                      <div style={{width:90,textAlign:'right',flexShrink:0}}>
                        <div className="cg-item-amt"
                          style={{color:t.type==='income'?'var(--income)':'var(--ink)'}}>

                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </>
      )}
    </div>
  );
}

/* ══ TAB 3: 통계 ══ */
function TabStats({ txList }) {
  const [ym, setYm] = useState(thisMonth());
  function prevMonth() {
    const [y,m]=ym.split('-').map(Number);
    setYm(m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,'0')}`);
  }
  function nextMonth() {
    const [y,m]=ym.split('-').map(Number);
    const n=m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;
    if(n<=thisMonth())setYm(n);
  }
  const mTxs  = useMemo(()=>txList.filter(t=>t.date.startsWith(ym)),[txList,ym]);
  const expTxs = useMemo(()=>mTxs.filter(t=>t.type==='expense'),[mTxs]);

  const byCat = useMemo(()=>{
    const r={};expTxs.forEach(t=>{r[t.category]=(r[t.category]||0)+t.amount;});
    return Object.entries(r).sort((a,b)=>b[1]-a[1]).slice(0,7);
  },[expTxs]);
  const catMax = byCat.length?byCat[0][1]:1;

  // 현금 vs 카드 도넛
  const methodData = useMemo(()=>{
    const total=expTxs.reduce((s,t)=>s+t.amount,0)||1;
    return ['현금','카드'].map(g=>({
      name:g,
      amount:expTxs.filter(t=>methodGroup(t.method)===g).reduce((s,t)=>s+t.amount,0),
    })).filter(d=>d.amount>0).map(d=>({...d,pct:Math.round(d.amount/total*100)}));
  },[expTxs]);

  const subjData = useMemo(()=>{
    const total=expTxs.reduce((s,t)=>s+t.amount,0)||1;
    return SUBJECTS.map(s=>({name:s,amount:expTxs.filter(t=>t.subject===s).reduce((a,t)=>a+t.amount,0)}))
      .filter(d=>d.amount>0).map(d=>({...d,pct:Math.round(d.amount/total*100)}));
  },[expTxs]);

  const top5 = useMemo(()=>{
    const r={};
    expTxs.forEach(t=>{const k=t.place||t.category;if(!r[k])r[k]={name:k,count:0,total:0};r[k].count++;r[k].total+=t.amount;});
    return Object.values(r).sort((a,b)=>b.count-a.count).slice(0,5);
  },[expTxs]);

  const COLORS=['#1C1C1E','#8E8E93','#C7C7CC','#D1D1D6'];
  function DonutChart({data,size=80,sw=14}) {
    const r=(size-sw)/2, circ=2*Math.PI*r;
    let offset=0;
    const slices=data.map((d,i)=>{const dash=(d.pct/100)*circ;const s={dash,gap:circ-dash,offset,color:COLORS[i%COLORS.length]};offset+=dash;return s;});
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block',margin:'0 auto 8px'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg)" strokeWidth={sw}/>
        {slices.map((s,i)=>(
          <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={sw}
            strokeDasharray={`${s.dash} ${s.gap}`} strokeDashoffset={circ/4-s.offset}
            transform={`rotate(-90 ${size/2} ${size/2})`}/>
        ))}
      </svg>
    );
  }

  return (
    <div className="screen">
      <div className="page-header"><div className="page-title">통계</div></div>
      <div className="stat-month-nav">
        <button className="mnav-btn" onClick={prevMonth}>‹</button>
        <div className="month-label">{fmtYM(ym)}</div>
        <button className="mnav-btn" onClick={nextMonth} style={{opacity:ym>=thisMonth()?'.3':'1'}}>›</button>
      </div>

      <div className="card" style={{padding:'16px 14px'}}>
        <div className="section-title" style={{padding:0,marginBottom:12}}>카테고리별 지출</div>
        {byCat.length===0
          ? <div style={{color:'var(--muted)',fontSize:14,textAlign:'center',padding:'12px 0'}}>데이터 없음</div>
          : byCat.map(([cat,amt])=>(
            <div key={cat} className="bar-row2">
              <div className="bar-cat2">{cat}</div>
              <div className="bar-track2"><div className="bar-fill2" style={{width:`${(amt/catMax*100).toFixed(1)}%`}}/></div>
              <div className="bar-val2">{fmt(amt)}</div>
            </div>
          ))
        }
      </div>

      <div className="donut-row">
        <div className="donut-card">
          <div className="donut-title">결제수단</div>
          <DonutChart data={methodData}/>
          {methodData.map((d,i)=>(
            <div key={d.name} className="legend-row">
              <div className="legend-dot" style={{background:COLORS[i]}}/>
              <div className="legend-text">{d.name}</div>
              <div className="legend-pct">{d.pct}%</div>
            </div>
          ))}
          {!methodData.length&&<div style={{color:'var(--muted)',fontSize:12,textAlign:'center'}}>데이터 없음</div>}
        </div>
        <div className="donut-card">
          <div className="donut-title">주체별</div>
          <DonutChart data={subjData}/>
          {subjData.map((d,i)=>(
            <div key={d.name} className="legend-row">
              <div className="legend-dot" style={{background:COLORS[i]}}/>
              <div className="legend-text">{d.name}</div>
              <div className="legend-pct">{d.pct}%</div>
            </div>
          ))}
          {!subjData.length&&<div style={{color:'var(--muted)',fontSize:12,textAlign:'center'}}>데이터 없음</div>}
        </div>
      </div>

      <div className="card" style={{padding:'16px 14px'}}>
        <div className="section-title" style={{padding:0,marginBottom:8}}>자주 가는 곳 TOP 5</div>
        {top5.length===0
          ? <div style={{color:'var(--muted)',fontSize:14,textAlign:'center',padding:'12px 0'}}>데이터 없음</div>
          : top5.map((p,i)=>(
            <div key={p.name} className="top5-item">
              <div className="top5-rank">{i+1}</div>
              <div className="top5-name">{p.name}</div>
              <div className="top5-cnt">{p.count}회</div>
              <div className="top5-amt">{fmt(p.total)}원</div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

/* ══ TAB 4: 월별 ══ */
function TabMonthly({ txList, onTxClick }) {
  const [detail, setDetail] = useState(null); // YYYY-MM
  const [detailView, setDetailView] = useState('date'); // 'date' | 'card'

  const months = useMemo(()=>{
    const list=[]; const now=new Date();
    for(let i=0;i<12;i++){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      list.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    }
    return list;
  },[]);

  const monthStats = useMemo(()=>months.map(ym=>{
    const mTxs=txList.filter(t=>t.date.startsWith(ym));
    return {
      ym,
      income:  mTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),
      expense: mTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0),
      count:   mTxs.filter(t=>t.type==='expense').length
    };
  }),[txList,months]);

  const maxVal = useMemo(()=>Math.max(...monthStats.map(s=>Math.max(s.income,s.expense)),1),[monthStats]);
  const avgExp = useMemo(()=>{
    const nz=monthStats.filter(s=>s.expense>0);
    return nz.length?nz.reduce((s,m)=>s+m.expense,0)/nz.length:0;
  },[monthStats]);

  // 월 상세 뷰
  if (detail) {
    const dTxs = txList.filter(t=>t.date.startsWith(detail));
    const expTxs = dTxs.filter(t=>t.type==='expense');

    // 카드사별 합계
    const byCard = useMemo(()=>{
      const r={};
      expTxs.forEach(t=>{
        if(methodGroup(t.method)==='카드'){
          if(!r[t.method])r[t.method]={name:t.method,total:0,items:[]};
          r[t.method].total+=t.amount;
          r[t.method].items.push(t);
        }
      });
      // 현금도 포함
      const cashItems=expTxs.filter(t=>methodGroup(t.method)==='현금');
      if(cashItems.length){
        r['현금(합계)']={name:'현금(합계)',total:cashItems.reduce((s,t)=>s+t.amount,0),items:cashItems};
      }
      return Object.values(r).sort((a,b)=>b.total-a.total);
    },[expTxs]);

    return (
      <div className="screen">
        <div className="page-header" style={{paddingBottom:8}}>
          <button className="back-btn" onClick={()=>setDetail(null)}><Icons.Back/> 월별</button>
          <div className="page-title" style={{marginTop:8}}>{fmtYM(detail)}</div>
          <div className="page-sub">지출 {fmt(expTxs.reduce((s,t)=>s+t.amount,0))}원 · {expTxs.length}건</div>
        </div>

        <div className="detail-view-tabs">
          <button className={`dvt-btn ${detailView==='date'?'active':''}`} onClick={()=>setDetailView('date')}>날짜순 내역</button>
          <button className={`dvt-btn ${detailView==='card'?'active':''}`} onClick={()=>setDetailView('card')}>카드사별 합계</button>
        </div>

        {detailView==='date' && <TxGrouped txList={dTxs} onTxClick={onTxClick}/>}

        {detailView==='card' && (
          byCard.length===0
            ? <div className="empty-state"><p>카드/현금 지출 내역이 없습니다.</p></div>
            : <div className="month-list-card">
                {byCard.map(g=>(
                  <div key={g.name} className="card-summary-item">
                    <div>
                      <div className="cs-name">{g.name}</div>
                      <div className="cs-sub">
                        {g.items.slice(0,3).map(t=>t.place||t.category).join(' · ')}
                        {g.items.length>3?` 외 ${g.items.length-3}건`:''}
                      </div>
                    </div>
                    <div className="cs-amt">{fmt(g.total)}원</div>
                  </div>
                ))}
              </div>
        )}
      </div>
    );
  }

  return (
    <div className="screen">
      <div className="page-header">
        <div className="page-title">월별 추이</div>
        <div className="page-sub">최근 12개월</div>
      </div>

      <div className="monthly-stats">
        <div className="monthly-stat-card">
          <div className="mstat-label">월 평균 지출</div>
          <div className="mstat-val">{fmt(avgExp)}원</div>
        </div>
        <div className="monthly-stat-card">
          <div className="mstat-label">전월 대비</div>
          {(()=>{
            const cur=monthStats[0]?.expense||0, prv=monthStats[1]?.expense||0;
            const diff=cur-prv;
            if(!prv) return <div className="mstat-val">-</div>;
            return <div className={`mstat-val ${diff>0?'up':'down'}`}>{diff>0?'+':''}{fmt(Math.abs(diff))}원 {diff>0?'↑':'↓'}</div>;
          })()}
        </div>
      </div>

      <div className="chart-container">
        <div className="chart-bars">
          {monthStats.slice(0,6).reverse().map(s=>{
            const ih=Math.round((s.income/maxVal)*90), eh=Math.round((s.expense/maxVal)*90);
            return (
              <div key={s.ym} className="chart-col2" onClick={()=>{setDetail(s.ym);setDetailView('date');}}>
                <div className="bar-pair2">
                  <div className="bar-in2" style={{height:`${ih||2}px`}}/>
                  <div className="bar-ex2" style={{height:`${eh||2}px`}}/>
                </div>
                <div className="chart-mlabel">{s.ym.split('-')[1]}월</div>
              </div>
            );
          })}
        </div>
        <div className="chart-legend-row">
          <div className="cl-item"><div className="cl-dot2" style={{background:'var(--income)',opacity:.75}}/> 수입</div>
          <div className="cl-item"><div className="cl-dot2" style={{background:'var(--ink)',opacity:.8}}/> 지출</div>
        </div>
      </div>

      <div className="section-title">월별 상세</div>
      <div className="month-list-card">
        {monthStats.map((s,i)=>{
          const prev=monthStats[i+1];
          const diff=prev?s.expense-prev.expense:null;
          return (
            <div key={s.ym} className="month-list-item" onClick={()=>{setDetail(s.ym);setDetailView('date');}}>
              <div>
                <div className="ml-month">{fmtYM(s.ym)}</div>
                <div className="ml-detail">지출 {s.count}건</div>
              </div>
              <div className="ml-right">
                <div className="ml-expense">{fmt(s.expense)}원</div>
                {diff!==null&&s.expense>0&&(
                  <div className={`ml-diff ${diff>0?'up':'down'}`}>전월 대비 {diff>0?'+':''}{fmt(Math.abs(diff))} {diff>0?'↑':'↓'}</div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ══ TAB 5: 설정 ══ */
function TabSettings({ txList, settings, onSettingsChange, onChangePinRequest }) {
  const ym=thisMonth();
  const mTxs=txList.filter(t=>t.date.startsWith(ym)&&t.type==='expense');
  const totalExp=mTxs.reduce((s,t)=>s+t.amount,0);
  const catExp=useMemo(()=>{const r={};mTxs.forEach(t=>{r[t.category]=(r[t.category]||0)+t.amount;});return r;},[mTxs]);

  function toggle(key){const ns={...settings,[key]:!settings[key]};onSettingsChange(ns);}

  function exportCSV(){
    const header='날짜,구분,금액,결제수단,카테고리,비용처,주체,메모';
    const rows=txList.map(t=>`${t.date},${t.type==='income'?'수입':'지출'},${t.amount},${t.method},${t.category},${t.place||''},${t.subject||''},${t.memo||''}`);
    const blob=new Blob(['\uFEFF'+[header,...rows].join('\n')],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`가계부_${today()}.csv`;a.click();
  }
  function backupJSON(){
    const blob=new Blob([JSON.stringify(txList,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`가계부_백업_${today()}.json`;a.click();
  }
  function restoreJSON(){
    const input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d)){saveData(d);window.location.reload();}}catch{alert('올바른 백업 파일이 아닙니다.');}};
      reader.readAsText(file);
    };input.click();
  }

  const budgetPct=settings.totalBudget?Math.min(totalExp/settings.totalBudget*100,100):0;

  return (
    <div className="screen">
      <div className="page-header"><div className="page-title">설정</div></div>

      <div className="settings-group">
        <div className="settings-group-title">이번 달 예산</div>
        <div className="settings-list">
          <div className="budget-item" style={{borderTop:'none'}}>
            <div className="budget-top"><div className="budget-name">전체 예산</div><div className="budget-nums">{fmt(totalExp)} / {fmt(settings.totalBudget)}원</div></div>
            <div className="budget-track"><div className={`budget-fill ${budgetPct>=100?'over':''}`} style={{width:`${budgetPct}%`}}/></div>
          </div>
          {Object.entries(settings.catBudgets||{}).map(([cat,budget])=>{
            const exp=catExp[cat]||0, pct=budget?Math.min(exp/budget*100,100):0;
            return (
              <div key={cat} className="budget-item">
                <div className="budget-top"><div className="budget-name">{cat}</div><div className="budget-nums">{fmt(exp)} / {fmt(budget)}원</div></div>
                <div className="budget-track"><div className={`budget-fill ${pct>=100?'over':''}`} style={{width:`${pct}%`}}/></div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="settings-group">
        <div className="settings-group-title">알림</div>
        <div className="settings-list">
          <div className="settings-item"><div className="settings-label">예산 초과 경고</div><button className={`toggle-sw ${settings.budgetAlert?'on':''}`} onClick={()=>toggle('budgetAlert')}/></div>
          <div className="settings-item"><div className="settings-label">월말 지출 리포트</div><button className={`toggle-sw ${settings.monthReport?'on':''}`} onClick={()=>toggle('monthReport')}/></div>
        </div>
      </div>

      <div className="settings-group">
        <div className="settings-group-title">보안</div>
        <div className="settings-list">
          <div className="settings-item" onClick={onChangePinRequest}>
            <div className="settings-label">비밀번호 변경</div>
            <div className="settings-value"><Icons.Chevron/></div>
          </div>
        </div>
      </div>

      <div className="settings-group">
        <div className="settings-group-title">데이터 관리</div>
        <div className="settings-list">
          <div className="settings-item" onClick={exportCSV}><div className="settings-label">CSV로 내보내기</div><div className="settings-value"><Icons.Chevron/></div></div>
          <div className="settings-item" onClick={backupJSON}><div className="settings-label">백업 (JSON)</div><div className="settings-value"><Icons.Chevron/></div></div>
          <div className="settings-item" onClick={restoreJSON}><div className="settings-label">백업 파일로 복원</div><div className="settings-value"><Icons.Chevron/></div></div>
        </div>
      </div>

      <div className="settings-group">
        <div className="settings-group-title">앱 정보</div>
        <div className="settings-list">
          <div className="settings-item"><div className="settings-label">총 거래 내역</div><div className="settings-value">{txList.length}건</div></div>
          <div className="settings-item"><div className="settings-label">버전</div><div className="settings-value">2.0.0</div></div>
        </div>
      </div>
      <div style={{height:8}}/>
    </div>
  );
}

/* ══ PIN 유틸 ══ */
function loadPin() { try{return localStorage.getItem(PIN_KEY)||'';}catch{return '';} }
function savePin(p){ try{localStorage.setItem(PIN_KEY,p);}catch{} }

/* ══ 비밀번호 화면 ══ */
function LockScreen({ onUnlock }) {
  const savedPin = loadPin();
  const hasPin   = savedPin.length === 4;

  // setup: 첫 설정 / confirm: 확인 재입력 / enter: 입력
  const [phase, setPhase]   = useState(hasPin ? 'enter' : 'setup');
  const [input, setInput]   = useState('');
  const [first, setFirst]   = useState('');  // setup 1단계 저장
  const [error, setError]   = useState('');
  const [shake, setShake]   = useState(false);

  function triggerError(msg) {
    setError(msg); setInput('');
    setShake(true); setTimeout(()=>setShake(false), 500);
  }

  function handleNum(n) {
    if (input.length >= 4) return;
    const next = input + n;
    setInput(next); setError('');
    if (next.length === 4) setTimeout(()=>handleComplete(next), 120);
  }

  function handleDel() { setInput(i=>i.slice(0,-1)); setError(''); }

  function handleComplete(pin) {
    if (phase === 'enter') {
      if (pin === savedPin) { onUnlock(); }
      else { triggerError('비밀번호가 틀렸습니다'); }
    } else if (phase === 'setup') {
      setFirst(pin); setInput(''); setPhase('confirm');
    } else if (phase === 'confirm') {
      if (pin === first) { savePin(pin); onUnlock(); }
      else { setFirst(''); setPhase('setup'); triggerError('번호가 다릅니다. 다시 설정해주세요'); }
    }
  }

  function handleSkip() { savePin(''); onUnlock(); }

  const titles = {
    enter:   '비밀번호 입력',
    setup:   '비밀번호 설정',
    confirm: '비밀번호 확인',
  };
  const subs = {
    enter:   '4자리 비밀번호를 입력하세요',
    setup:   '사용할 4자리 비밀번호를 입력하세요',
    confirm: '한 번 더 입력해주세요',
  };

  const dots = Array.from({length:4},(_,i)=>({
    filled: i < input.length,
    error:  error && i < input.length
  }));

  const nums = ['1','2','3','4','5','6','7','8','9','','0','del'];

  return (
    <div className="lock-screen">
      <div className="lock-title">AI 가계부</div>
      {phase!=='enter' && <div className="lock-setup-step">{phase==='setup'?'1단계 · 새 비밀번호':'2단계 · 확인'}</div>}
      <div className="lock-sub">{subs[phase]}</div>

      <div className="lock-dots" style={shake?{animation:'headShake .4s ease'}:{}}>
        {dots.map((d,i)=>(
          <div key={i} className={`lock-dot ${d.filled?'filled':''} ${d.error?'error':''}`}/>
        ))}
      </div>

      <div className="lock-error">{error}</div>

      <div className="numpad">
        {nums.map((n,i)=>(
          n==='' ? <div key={i} className="numpad-btn empty"/> :
          n==='del' ? (
            <button key={i} className="numpad-btn del" onClick={handleDel}>⌫</button>
          ) : (
            <button key={i} className="numpad-btn" onClick={()=>handleNum(n)}>{n}</button>
          )
        ))}
      </div>

      {phase==='setup' && (
        <button className="lock-skip" onClick={handleSkip}>비밀번호 없이 사용</button>
      )}
    </div>
  );
}

/* ══ 메인 앱 ══ */
function App() {
  const [unlocked, setUnlocked] = useState(false);
  const [tab, setTab]           = useState(0);
  const [txList, setTxList]     = useState(()=>loadData());
  const [settings, setSettings] = useState(()=>loadSettings());
  const [showInput, setShowInput]   = useState(false);
  const [editTx, setEditTx]         = useState(null);
  const [detailTx, setDetailTx]     = useState(null);
  const [toast, setToast]           = useState('');
  const [showPinChange, setShowPinChange] = useState(false);
  const toastTimer = useRef(null);

  useEffect(()=>{ saveData(txList); },[txList]);
  useEffect(()=>{ saveSettings(settings); },[settings]);

  function showToast(msg) {
    setToast(msg);
    if(toastTimer.current)clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>setToast(''),2000);
  }
  function handleSave(tx) {
    setTxList(prev=>{
      const exists=prev.find(t=>t.id===tx.id);
      return exists?prev.map(t=>t.id===tx.id?tx:t):[...prev,tx];
    });
    setShowInput(false);setEditTx(null);
    showToast(editTx?'수정했습니다':'저장했습니다');
  }
  function handleDelete(id){setTxList(prev=>prev.filter(t=>t.id!==id));setDetailTx(null);showToast('삭제했습니다');}
  function handleTxClick(tx){setDetailTx(tx);}
  function handleEdit(tx){setDetailTx(null);setEditTx(tx);setShowInput(true);}

  // 잠금화면 표시 여부
  if (!unlocked) {
    return <LockScreen onUnlock={()=>setUnlocked(true)}/>;
  }

  // 비밀번호 변경 화면
  if (showPinChange) {
    // 기존 pin 삭제 후 재설정
    savePin('');
    return <LockScreen onUnlock={()=>{ setShowPinChange(false); showToast('비밀번호가 변경됐습니다'); }}/>;
  }

  const tabs=[
    {label:'홈',    Icon:Icons.Home},
    {label:'내역',  Icon:Icons.List},
    {label:'통계',  Icon:Icons.Chart},
    {label:'월별',  Icon:Icons.Calendar},
    {label:'설정',  Icon:Icons.Settings},
  ];

  return (
    <>
      {tab===0&&<TabHome     txList={txList} onTxClick={handleTxClick}/>}
      {tab===1&&<TabList     txList={txList} onTxClick={handleTxClick}/>}
      {tab===2&&<TabStats    txList={txList}/>}
      {tab===3&&<TabMonthly  txList={txList} onTxClick={handleTxClick}/>}
      {tab===4&&<TabSettings txList={txList} settings={settings} onSettingsChange={setSettings} onChangePinRequest={()=>setShowPinChange(true)}/>}

      {tab!==4&&<button className="fab" onClick={()=>{setEditTx(null);setShowInput(true);}}>+</button>}

      <div className="tabbar">
        {tabs.map(({label,Icon},i)=>(
          <button key={i} className={`tab-btn ${tab===i?'active':''}`} onClick={()=>setTab(i)}>
            <Icon/><span>{label}</span>
          </button>
        ))}
      </div>

      {showInput&&<InputModal onClose={()=>{setShowInput(false);setEditTx(null);}} onSave={handleSave} editTx={editTx}/>}
      {detailTx&&<TxDetailModal tx={detailTx} onClose={()=>setDetailTx(null)} onEdit={handleEdit} onDelete={handleDelete}/>}
      {toast&&<div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
